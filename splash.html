<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .matrix-bg::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 136, 0.5); animation: scanline 2s linear infinite; }
        #intro-vie { animation: fadeOut 1s forwards 1.5s; }
        #intro-app { opacity: 0; animation: fadeIn 1s forwards 2.5s; }
        @keyframes fadeOut { to { opacity: 0; transform: scale(1.2); } }
        @keyframes fadeIn { to { opacity: 1; transform: scale(1); } }
        .glow-text { text-shadow: 0 0 15px #00ff88; }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body class="bg-[#050505] h-screen flex items-center justify-center relative overflow-hidden matrix-bg">
    
    <div class="text-center relative">
        <div id="intro-vie" class="absolute inset-0 flex flex-col items-center justify-center">
            <h2 class="text-gray-500 text-[10px] tracking-[0.5em] mb-2 uppercase">System Developed By</h2>
            <h1 class="text-6xl font-black text-white italic tracking-tighter glow-text">VIE</h1>
        </div>

        <div id="intro-app" class="flex flex-col items-center justify-center">
            <h1 class="text-4xl font-black text-green-500 italic uppercase tracking-tighter glow-text">Devil Elite Pro</h1>
            <div class="w-48 h-1 bg-white/10 rounded-full mt-6 overflow-hidden">
                <div class="h-full bg-green-500" style="width: 0%; animation: load 2s forwards 3s;"></div>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => { 
            // Intro ke baad yeh check karega ki login hai ya nahi
            window.location.href = "/check_status"; 
        }, 5500); // 5.5 Seconds ka delay
    </script>

</body>
</html>
